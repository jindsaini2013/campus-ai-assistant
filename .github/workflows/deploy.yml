name: Deploy Campus AI Assistant

on:
  push:
    branches:
      - main
    # This section ensures branding changes (icons/name) trigger a deploy
    paths:
      - 'supabase/functions/**'  # AI Logic
      - 'src/**'                 # Frontend Components
      - 'public/**'              # Favicons/Icons
      - 'index.html'             # Website Name/Title

jobs:
  deploy-ai:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4 # Updated to v4 for better performance

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy All Functions
        run: supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}